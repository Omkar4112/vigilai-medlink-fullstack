<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VigilAI MedLink — Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #04080f;
  --surface:  rgba(13, 25, 41, 0.7);
  --surface2: rgba(20, 35, 55, 0.8);
  --border:   rgba(255, 255, 255, 0.08);
  --border-focus: rgba(0, 200, 255, 0.4);
  --accent:   #00d4ff;
  --accent2:  #0057ff;
  --danger:   #ff3b5c;
  --success:  #00e5a0;
  --text:     #f0f7ff;
  --muted:    #6b8eb0;
  --mono:     'DM Mono', monospace;
  --sans:     'Plus Jakarta Sans', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-y: auto;
  padding: 40px 20px;
  perspective: 1000px;
}

/* Background elements */
.bg-visuals {
  position: fixed; inset: 0; z-index: -1;
  background: #020408;
}

.grid-bg {
  position: absolute; inset: 0;
  background-image: 
    linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.3;
  pointer-events: none;
}
.orb-1 { width: 400px; height: 400px; background: var(--accent2); top: -100px; left: -100px; }
.orb-2 { width: 300px; height: 300px; background: var(--accent); bottom: -50px; right: -50px; }

/* Auth Card */
.card {
  background: #080f1a;
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 56px 48px;
  width: 100%;
  max-width: 480px;
  box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
  animation: reveal 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  position: relative;
  z-index: 10;
}

@keyframes reveal {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: none; }
}

.logo {
  display: flex; align-items: center; gap: 16px;
  margin-bottom: 40px;
}
.logo-icon {
  width: 52px; height: 52px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border-radius: 14px;
  display: grid; place-items: center;
  font-size: 26px;
  box-shadow: 0 8px 20px rgba(0, 87, 255, 0.2);
}
.logo-text h1 { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
.logo-text p { font-size: 11px; font-family: var(--mono); color: var(--muted); margin-top: 2px; }

h2 { font-size: 22px; font-weight: 700; margin-bottom: 10px; }
.subtitle { color: var(--muted); font-size: 13px; font-family: var(--mono); margin-bottom: 36px; }

/* Role Selector */
.role-tabs {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 12px; margin-bottom: 32px;
}
.role-tab {
  padding: 14px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  cursor: pointer;
  text-align: center;
  transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.role-tab .icon { font-size: 20px; opacity: 0.8; }
.role-tab:hover { border-color: var(--muted); color: var(--text); background: rgba(255,255,255,0.02); }
.role-tab.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0, 200, 255, 0.08);
  box-shadow: 0 0 15px rgba(0, 200, 255, 0.1);
}
.role-tab.active .icon { opacity: 1; }

/* Fields */
.field { margin-bottom: 20px; }
.field label {
  display: block;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
  margin-left: 4px;
}
.input-wrapper { position: relative; }
.field input {
  width: 100%;
  background: rgba(0, 0, 0, 0.2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  padding: 14px 16px;
  outline: none;
  transition: all 0.2s;
}
.field input:focus {
  border-color: var(--accent);
  background: rgba(0, 0, 0, 0.3);
  box-shadow: 0 0 0 4px rgba(0, 212, 255, 0.1);
}

.btn {
  width: 100%;
  padding: 16px;
  background: linear-gradient(135deg, var(--accent2), var(--accent));
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin-top: 8px;
  box-shadow: 0 10px 20px -5px rgba(0, 87, 255, 0.4);
}
.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 15px 30px -5px rgba(0, 87, 255, 0.5);
  opacity: 0.95;
}
.btn:active { transform: translateY(0); }

.error-msg {
  background: rgba(255, 59, 92, 0.1);
  border-left: 3px solid var(--danger);
  color: var(--danger);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  margin-bottom: 20px;
  display: none;
  animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
}
@keyframes shake {
  10%, 90% { transform: translate3d(-1px, 0, 0); }
  20%, 80% { transform: translate3d(2px, 0, 0); }
  30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
  40%, 60% { transform: translate3d(4px, 0, 0); }
}
.error-msg.show { display: block; }

/* Demo section */
.demo-creds {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}
.demo-creds p {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  margin-bottom: 16px;
  font-family: var(--mono);
}
.cred-grid { display: flex; flex-direction: column; gap: 8px; }
.cred {
  display: flex; justify-content: space-between; align-items: center;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.cred:hover {
  background: rgba(255, 255, 255, 0.05);
  border-color: rgba(255, 255, 255, 0.2);
  transform: translateX(4px);
}
.cred span:first-child { font-family: var(--mono); color: var(--text); opacity: 0.8; }
.role-badge {
  font-size: 9px;
  font-weight: 800;
  padding: 3px 8px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.badge-clinic   { background: rgba(0, 229, 160, 0.1); color: var(--success); }
.badge-hospital { background: rgba(0, 87, 255, 0.15); color: #73a4ff; }
.badge-admin    { background: rgba(255, 180, 0, 0.1); color: #ffb400; }

.system-status {
  position: fixed; bottom: 24px; left: 0; right: 0;
  display: flex; justify-content: center; align-items: center; gap: 12px;
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 0.1em;
}
.status-dot {
  width: 8px; height: 8px;
  background: var(--success);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--success);
  animation: pulse-glow 2s infinite;
}
@keyframes pulse-glow {
  0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 160, 0.7); }
  70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(0, 229, 160, 0); }
  100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 229, 160, 0); }
}

</style>
</head>
<body>

<div class="bg-visuals">
  <div class="grid-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">🏥</div>
    <div class="logo-text">
      <h1>VigilAI</h1>
      <p>MEDLINK PLATFORM v2.0</p>
    </div>
  </div>

  <h2>Secure Access</h2>
  <p class="subtitle">Enter your credentials to continue</p>

  <div class="role-tabs" id="roleTabs">
    <div class="role-tab active" data-role="CLINIC" onclick="selectRole(this)">
      <span class="icon">🏨</span>
      <span>Clinic</span>
    </div>
    <div class="role-tab" data-role="HOSPITAL" onclick="selectRole(this)">
      <span class="icon">🏥</span>
      <span>Hospital</span>
    </div>
    <div class="role-tab" data-role="ADMIN" onclick="selectRole(this)">
      <span class="icon">⚙️</span>
      <span>Admin</span>
    </div>
  </div>

  <div class="error-msg" id="errMsg"></div>

  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="doctor@hospital.org" autocomplete="email">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
           onkeydown="if(event.key==='Enter') login()">
  </div>

  <button class="btn" id="loginBtn" onclick="login()">Sign In →</button>

  <div class="demo-creds">
    <p>// demo credentials (click to auto-fill)</p>
    <div class="cred-grid">
      <div class="cred" onclick="fillCred('clinic@vigilai.health','Clinic@123','CLINIC')">
        <span>clinic@vigilai.health</span>
        <span class="role-badge badge-clinic">CLINIC</span>
      </div>
      <div class="cred" onclick="fillCred('hospital@vigilai.health','Hospital@123','HOSPITAL')">
        <span>hospital@vigilai.health</span>
        <span class="role-badge badge-hospital">HOSPITAL</span>
      </div>
      <div class="cred" onclick="fillCred('admin@vigilai.health','Admin@123','ADMIN')">
        <span>admin@vigilai.health</span>
        <span class="role-badge badge-admin">ADMIN</span>
      </div>
    </div>
  </div>
</div>

<div class="system-status">
  <span class="status-dot"></span>
  SYSTEM OPERATIONAL &nbsp;|&nbsp; API: <span id="apiStatus">CHECKING…</span>
</div>

<script>
const API = 'https://backend-ysf3.onrender.com';
let selectedRole = 'CLINIC';

function selectRole(el) {
  document.querySelectorAll('.role-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedRole = el.dataset.role;
}

function fillCred(email, pass, role) {
  document.getElementById('email').value    = email;
  document.getElementById('password').value = pass;
  document.querySelectorAll('.role-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.role === role);
  });
  selectedRole = role;
}

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errEl    = document.getElementById('errMsg');
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) {
    showError('Please enter email and password.'); return;
  }

  btn.textContent = 'Authenticating…';
  btn.classList.add('loading');
  errEl.classList.remove('show');

  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (!res.ok) {
      showError(data.error || 'Login failed.');
      return;
    }

    // Store session
    localStorage.setItem('vigilai_token',    data.token);
    localStorage.setItem('vigilai_role',     data.role);
    localStorage.setItem('vigilai_entityId', data.entityId || '');
    localStorage.setItem('vigilai_name',     data.fullName || email);
    localStorage.setItem('vigilai_email',    data.email);

    // Role-based redirect
    const redirects = {
      CLINIC:   'clinic.html',
      HOSPITAL: 'hospital.html',
      ADMIN:    'admin.html'
    };
    window.location.href = redirects[data.role] || 'clinic.html';

  } catch (e) {
    showError('Cannot reach server. Running in demo mode.');
    // Demo mode — redirect by selected role
    localStorage.setItem('vigilai_token',    'demo-token');
    localStorage.setItem('vigilai_role',     selectedRole);
    localStorage.setItem('vigilai_entityId', selectedRole === 'HOSPITAL' ? '1' : 'clinic-demo-001');
    localStorage.setItem('vigilai_name',     selectedRole + ' Demo User');
    setTimeout(() => {
      const r = { CLINIC:'clinic.html', HOSPITAL:'hospital.html', ADMIN:'admin.html' };
      window.location.href = r[selectedRole];
    }, 800);
  } finally {
    btn.textContent = 'Sign In →';
    btn.classList.remove('loading');
  }
}

function showError(msg) {
  const el = document.getElementById('errMsg');
  el.textContent = msg;
  el.classList.add('show');
}

// Check API health
(async () => {
  try {
    const r = await fetch(`${API}/health`, { signal: AbortSignal.timeout(3000) });
    document.getElementById('apiStatus').textContent = r.ok ? 'ONLINE' : 'DEGRADED';
  } catch {
    document.getElementById('apiStatus').textContent = 'OFFLINE (demo)';
  }
})();
</script>
</body>
</html>
